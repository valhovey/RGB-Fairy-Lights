; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = adafruit_qtpy_esp32s3

; Shared across all envs. Serial baud matches Serial.begin(115200) in main.cpp.
[env]
monitor_speed = 115200

[env:adafruit_qtpy_esp32s3]
platform = espressif32
; Adafruit product 5426: QT Py ESP32-S3, 8 MB flash, no PSRAM.
; (The bare id "adafruit_qtpy_esp32s3" no longer exists in espressif32.)
board = adafruit_qtpy_esp32s3_nopsram
board_upload.flash_size=8MB
framework = arduino
lib_deps =
    git@github.com:adafruit/Adafruit_NeoPixel.git
    https://github.com/knolleary/pubsubclient.git
    bblanchon/ArduinoJson@^7

[env:adafruit_qtpy_esp32]
platform = espressif32
board = adafruit_qtpy_esp32
framework = arduino
; upload_port = /dev/tty.wchusbserial54790413491
lib_deps =
    git@github.com:adafruit/Adafruit_NeoPixel.git
    https://github.com/knolleary/pubsubclient.git
    bblanchon/ArduinoJson@^7
